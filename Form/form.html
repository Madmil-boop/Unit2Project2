<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Note</title>
</head>
<body>
  <h1 id="page-title">Add Note</h1>
  <a href="/">← Back</a> 
  <!--  Anchor tag to bring you back to the main page -->
 
  <br><br>
 <!-- Textbox to put title -->
  <label>Title<br>
    <input type="text" id="title" placeholder="Note title" />
  </label>
 
  <br><br>
  <!-- Body to put note content -->
  <label>Details<br>
    <textarea id="body" placeholder="Write your note..." rows="6" cols="40"></textarea>
  </label>
 
  <br><br>
 <!-- Save button -->
  <button id="save-btn">Save</button>
 
  
</body>
</html>
