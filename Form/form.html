<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Note</title>
</head>
<body>
  <h1>Add Note</h1>
  <a href="/">← Back</a>

  <br><br>

  <form action="/new" method="POST">
    <label>Title<br>
      <input type="text" name="title" placeholder="Note title" />
    </label><br><br>

    <label>Details<br>
      <textarea name="body" placeholder="Write your note..." rows="6" cols="40"></textarea>
    </label><br><br>

    <button type="submit">Save</button>
  </form>
</body>
</html>
