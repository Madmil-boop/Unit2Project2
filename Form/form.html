<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Note</title>
</head>
<body>
    <h1>New Note</h1>
    <a href="/">← Back</a><br><br>
 
    <label>Title<br>
        <input type="text" id="title" placeholder="Note title" />
    </label><br><br>
 
    <label>Body<br>
        <textarea id="body" placeholder="Write your note..." rows="6" cols="40"></textarea>
    </label><br><br>
 
    <button onclick="saveNote()">Save</button>
 
    <script>
      // Save the new note by sending a POST request to the server
        function saveNote() {
            const title = document.getElementById('title').value.trim();
            const body  = document.getElementById('body').value.trim();
 
            if (!title) { alert('Title is required'); return; }
            // Send the new note data to the server to create it
            fetch('/api/notes', {
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ title, body }) 
            }).then(res => {
                if (res.ok) window.location.href = '/';
            });
        }
    </script>
</body>
</html>
