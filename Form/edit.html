<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Note</title>
</head>
<body>
    <h1>Edit Note</h1>
    <a href="/">← Back</a><br><br>
 
    <label>Title<br>
        <input type="text" id="title" />
    </label><br><br>
 
    <label>Body<br>
        <textarea id="body" rows="6" cols="40"></textarea>
    </label><br><br>
 
    <button onclick="saveNote()">Save</button>
 
    <script>
        const id = new URLSearchParams(window.location.search).get('id'); 
 
        // Load existing note
        fetch('/api/notes/' + id)
            .then(res => res.json())
            .then(note => {
                document.getElementById('title').value = note.title;
                document.getElementById('body').value  = note.body;
            });
            // Save the updated note by sending a PUT request to the server
        function saveNote() {
            const title = document.getElementById('title').value.trim(); 
            const body  = document.getElementById('body').value.trim();
 
            if (!title) { alert('Title is required'); return; }
            
             //similar to saveNote in form.html but sends a PUT request to update the existing note instead of creating a new one
            fetch('/api/notes/' + id, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, body }) 
            }).then(res => {
                if (res.ok) window.location.href = '/';
            });
        }
    </script>
</body>
</html>
